apiVersion: workload.nephio.org/v1alpha1
kind: NFDeployment
metadata: # kpt-merge: amf-example/amf-example
  name: amf-ran
  namespace: oai-core
  annotations:
    internal.kpt.dev/upstream-identifier: 'workload.nephio.org|NFDeployment|amf-example|amf-example'
spec:
  provider: amf.openairinterface.org
  parametersRefs:
  - name: oai-amf-config
    apiVersion: workload.nephio.org/v1alpha1
    kind: NFConfig
  networkInstances:
  - name: vpc-ran
    interfaces:
    - n2
  interfaces:
  - name: n2
    ipv4:
      address: 172.2.0.1/16
      gateway: ""
    vlanID: 2
  capacity:
    maxDownlinkThroughput: "0"
    maxSubscribers: 1000
    maxUplinkThroughput: "0"
