apiVersion: ref.nephio.org/v1alpha1
kind: Config
metadata:
  name: cuup-ran-cucp-myran
  namespace: oai-ran-cuup
  annotations:
    specializer.nephio.org/owner: req.nephio.org/v1alpha1.Dependency.cucp
spec:
  config:
    apiVersion: workload.nephio.org/v1alpha1
    kind: NFDeployment
    metadata:
      name: cucp-myran
      namespace: oai-ran-cucp
      annotations:
        config.kubernetes.io/index: "0"
        internal.config.kubernetes.io/index: "0"
        internal.config.kubernetes.io/path: cucpdeployment.yaml
        internal.kpt.dev/upstream-identifier: workload.nephio.org|NFDeployment|example|cucp-example
    spec:
      interfaces:
      - name: e1
        ipv4:
          address: 172.4.0.1/16
          gateway: ""
        vlanID: 4
      - name: f1c
        ipv4:
          address: 172.5.0.3/16
          gateway: ""
        vlanID: 2
      - name: n2
        ipv4:
          address: 172.2.1.1/16
          gateway: ""
        vlanID: 3
      networkInstances:
      - name: vpc-cu-e1
        interfaces:
        - e1
      - name: vpc-cudu-f1
        interfaces:
        - f1c
      - name: vpc-ran
        interfaces:
        - n2
      parametersRefs:
      - name: cucp-myran-amf-ran
        apiVersion: ref.nephio.org/v1alpha1
        kind: Config
      - name: cucp-nf-config
        apiVersion: workload.nephio.org/v1alpha1
        kind: NFConfig
      provider: cucp.openairinterface.org
