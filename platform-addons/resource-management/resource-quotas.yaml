apiVersion: v1
kind: ResourceQuota
metadata: # kpt-merge: openairinterface/ran-quota
  name: ran-quota
  namespace: openairinterface
  annotations:
    internal.kpt.dev/upstream-identifier: '|ResourceQuota|openairinterface|ran-quota'
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "30"
    limits.memory: 60Gi
    persistentvolumeclaims: "10"
---
